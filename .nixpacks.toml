# .nixpacks.toml
[phases.setup]
commands = ["echo Setting up PHP 8.4"]

[phases.install]
php = "8.4"

[phases.build]
commands = [
  "composer install --optimize-autoloader --no-interaction",
  "php artisan migrate --force"
]

[phases.start]
commands = ["php artisan serve --host=0.0.0.0 --port=$PORT"]
